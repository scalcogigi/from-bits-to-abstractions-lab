<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Blocos e Bits</title>
    <style>
      html, body { height: 100%; margin: 0; overflow: hidden; font-family: sans-serif; }
      #blocklyDiv { height: 100%; width: 100%; }
    </style>
  </head>
  <body>
  <div class="layout">
    <div id="blocklyDiv"></div>

    <div id="assemblyPanel">
      <div class="assemblyHeader">
        <span id="modoLivreIndicator" style="
            margin-left: 10px;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            background-color: #334155;
            color: #cbd5e1;
          ">
            Modo Normal
        </span>
        <button id="btnCopy">Copiar</button>
        <button id="btnNew">Novo Workspace</button>

      </div>

      <pre id="output"></pre>
    </div>
  </div>
</body>
</html>
